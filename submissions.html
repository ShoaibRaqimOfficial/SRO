<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Student Assignment Reviews</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f4f7fb;

padding:30px;

}

.container{

max-width:1600px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

margin-bottom:25px;

flex-wrap:wrap;

}

.header h1{

font-size:34px;

color:#0B3D91;

}

.header p{

margin-top:8px;

color:#666;

}

.search-section{

display:grid;

grid-template-columns:1fr 1fr 1fr;

gap:15px;

margin-bottom:25px;

}

.search-section input,

.search-section select{

padding:14px;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

outline:none;

}

.summary{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:30px;

}

.summary-card{

background:#fff;

padding:22px;

border-radius:12px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.summary-card h2{

font-size:34px;

color:#0B3D91;

margin-bottom:8px;

}

.summary-card p{

color:#666;

}

.review-container{

display:flex;

flex-direction:column;

gap:25px;

}

.assignment-card{

background:#fff;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

overflow:hidden;

}

.assignment-header{

background:#0B3D91;

color:white;

padding:22px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:15px;

}

.assignment-header h2{

font-size:24px;

}

.assignment-meta{

display:flex;

gap:30px;

flex-wrap:wrap;

padding:20px;

background:#f8fafc;

border-bottom:1px solid #eee;

}

.assignment-meta div{

font-size:15px;

}

.assignment-meta strong{

display:block;

margin-bottom:6px;

color:#0B3D91;

}

.table-wrapper{

overflow:auto;

}
  table{

width:100%;

border-collapse:collapse;

min-width:1400px;

}

thead{

background:#0B3D91;

color:#fff;

}

th{

padding:16px;

text-align:left;

font-size:15px;

}

td{

padding:16px;

border-bottom:1px solid #eee;

vertical-align:top;

font-size:14px;

}

.status{

padding:7px 14px;

border-radius:20px;

font-weight:bold;

font-size:13px;

display:inline-block;

}

.pending{

background:#fff3cd;

color:#8a6d3b;

}

.approved{

background:#d1fae5;

color:#065f46;

}

.rejected{

background:#fee2e2;

color:#991b1b;

}

.review-box{

width:220px;

height:90px;

padding:10px;

border:1px solid #ddd;

border-radius:8px;

resize:vertical;

font-size:14px;

}

.action-group{

display:flex;

gap:8px;

flex-wrap:wrap;

}

.action-group button{

border:none;

padding:10px 15px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

color:white;

}

.save-btn{

background:#2563eb;

}

.approve-btn{

background:#16a34a;

}

.reject-btn{

background:#dc2626;

}

.delete-btn{

background:#111827;

}

.open-btn{

background:#f59e0b;

color:#fff;

padding:8px 15px;

border-radius:8px;

text-decoration:none;

font-weight:bold;

display:inline-block;

}

.empty{

padding:60px;

text-align:center;

font-size:18px;

color:#777;

}

@media(max-width:900px){

.search-section{

grid-template-columns:1fr;

}

.summary{

grid-template-columns:1fr;

}

.header{

flex-direction:column;

align-items:flex-start;

}

body{

padding:15px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>📚 Student Assignment Reviews</h1>

<p>

Review, approve and manage all student assignment submissions.

</p>

</div>

</div>

<div class="search-section">

<input
type="text"
id="studentSearch"
placeholder="🔍 Search Student">

<input
type="text"
id="assignmentSearch"
placeholder="📖 Search Assignment">

<select id="statusFilter">

<option value="All">

All Status

</option>

<option value="Pending">

Pending

</option>

<option value="Approved">

Approved

</option>

<option value="Rejected">

Rejected

</option>

</select>

</div>
<div class="summary">

<div class="summary-card">

<h2 id="totalSubmissions">
0
</h2>

<p>Total Submissions</p>

</div>

<div class="summary-card">

<h2 id="pendingCount">
0
</h2>

<p>Pending Reviews</p>

</div>

<div class="summary-card">

<h2 id="approvedCount">
0
</h2>

<p>Approved</p>

</div>

<div class="summary-card">

<h2 id="rejectedCount">
0
</h2>

<p>Rejected</p>

</div>

</div>

<div
id="reviewContainer"
class="review-container">

<div class="empty">

Loading submissions...

</div>

</div>

</div>

<script
type="module"
src="submissions.js">

</script>

</body>

</html>
