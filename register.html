<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Student Registration</title>

<link rel="stylesheet" href="css/register.css">
</head>

<body class="login-page">

<div class="login-box">

<img
src="logodesign.png"
class="login-logo"
alt="SRO Academy Logo">

<h2 class="academy-title">
    SRO Academy
</h2>

<p class="portal-text">
    Student Registration
</p>

<p class="login-subtitle">
    Create your student account and start learning with SRO Academy.
</p>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

<input
type="date"
id="dob"
required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<span
id="togglePassword"
class="toggle-password">
Show
</span>

</div>

<div class="password-box">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<span
id="toggleConfirmPassword"
class="toggle-password">
Show
</span>

</div>

<button
type="submit"
class="login-btn">
Create Account
</button>

</form>

<div class="login-links">

<a href="login.html">
Already have an account? Login
</a>

</div>

<p id="message"></p>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
