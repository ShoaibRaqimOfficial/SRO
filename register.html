<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Apply for Admission</title>

<link rel="stylesheet" href="css/register.css">

</head>

<body class="login-page">

<div class="login-box">

<img
src="assets/logo/mainlogo.png"
class="login-logo"
alt="SRO Academy Logo">

<h2 class="academy-title">
SRO Academy
</h2>

<p class="portal-text">
Apply for Admission
</p>

<p class="login-subtitle">
Submit your application. After approval, you will receive access to the Student Portal.
</p>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

<input
type="text"
id="city"
placeholder="City"
required>
  
<input
type="date"
id="dob"
required>
<select
id="course"
required>

<option value="">
Select Course
</option>

<option>
Professional Video Editing
</option>

<option>
YouTube Automation
</option>

<option>
TikTok Automation
</option>

<option>
AI Tools
</option>

<option>
Graphic Design
</option>

<option>
Content Creation
</option>

</select>

<textarea
id="reason"
placeholder="Why do you want to join SRO Academy?"
rows="5"
required></textarea>

<button
type="submit"
class="login-btn">

Submit Application

</button>

</form>

<div class="login-links">

<a href="login.html">

Already a Student?
Login to Student Portal

</a>

</div>

<p id="message"></p>

</div>

<script type="module" src="register.js"></script>

</body>

</html>
