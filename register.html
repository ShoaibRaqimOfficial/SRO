<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Student Registration</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-box">

<h1>SRO Academy</h1>

<p>Create Student Account</p>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Mobile Number"
required>

<input
type="date"
id="dob"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button
type="submit"
class="login-btn">
Create Account
</button>

</form>

<div class="login-links">

<a href="login.html">
Already have an account? Login
</a>

</div>

<p id="message"></p>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
