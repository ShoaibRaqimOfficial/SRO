<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Student Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-box">

    <h1>SRO Academy</h1>

    <p>Student Login Portal</p>

    <form>

        <input
        type="email"
        placeholder="Email Address"
        required>

        <input
        type="password"
        placeholder="Password"
        required>

        <button class="login-btn">
            Login
        </button>

    </form>

    <div class="login-links">

        <a href="#">
            Forgot Password?
        </a>

        <a href="#">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
