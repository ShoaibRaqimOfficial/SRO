<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy | Student Login</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body class="login-page">

<div class="login-box">

    <img
src="logodesign.png"
class="login-logo"
alt="SRO Academy Logo">

<h2 class="academy-title">
    SRO Academy
</h2>

<p class="portal-text">
    Student Login Portal
</p>
<p class="login-subtitle">
    Continue your learning journey with SRO Academy.
</p>
    <form id="loginForm">

        <input
        type="email"
        id="email"
        placeholder="Email Address"
        required>

      <div class="password-box">

    <input
    type="password"
    id="password"
    placeholder="Password"
    required>

    <span id="togglePassword" class="toggle-password">
        👁
    </span>

</div>

      <button type="submit" class="login-btn">

    <span id="loginText">
        Login to Academy
    </span>

</button>

    </form>

    <div class="login-links">

        <a href="#" id="forgotPassword">
            Forgot Password?
        </a>

      <a href="register.html">
    Create Account
</a>

    </div>

    <p id="message"></p>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
