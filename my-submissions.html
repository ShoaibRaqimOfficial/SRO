<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

SRO Academy | My Submissions

</title>

<link
rel="stylesheet"
href="style.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;

}

body{

background:#f5f7fb;

}

.page{

display:flex;

min-height:100vh;

}

.sidebar{

width:250px;

background:#0B3D91;

color:white;

position:fixed;

left:0;
top:0;
bottom:0;

padding:25px;

overflow:auto;

}

.logo{

font-size:30px;

font-weight:bold;

margin-bottom:35px;

}

.sidebar a{

display:block;

color:white;

text-decoration:none;

padding:14px 18px;

border-radius:10px;

margin-bottom:10px;

transition:.25s;

}

.sidebar a:hover{

background:rgba(255,255,255,.12);

}

.sidebar .active{

background:#2563eb;

}

.main{

margin-left:250px;

width:calc(100% - 250px);

padding:35px;

}

.header{

background:white;

border-radius:18px;

padding:30px;

box-shadow:0 10px 25px rgba(0,0,0,.06);

margin-bottom:30px;

}

.header h1{

font-size:36px;

color:#0B3D91;

margin-bottom:10px;

}

.header p{

color:#666;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:35px;

}

.stat-card{

background:white;

padding:28px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.06);

text-align:center;

}

.stat-card h2{

font-size:38px;

color:#2563eb;

margin-bottom:10px;

}

.stat-card p{

color:#666;

font-size:15px;

}

.section-title{

font-size:30px;

font-weight:bold;

margin-bottom:25px;

color:#0B3D91;

}

#submissionList{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(420px,1fr));

gap:25px;

}
  .assignment-card{

background:white;

border-radius:18px;

padding:22px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

display:flex;

flex-direction:column;

gap:16px;

}

.assignment-card h3{

font-size:24px;

color:#0B3D91;

word-break:break-word;

}

.status{

display:inline-block;

padding:8px 18px;

border-radius:25px;

font-size:13px;

font-weight:bold;

}

.approved{

background:#dcfce7;

color:#166534;

}

.pending{

background:#fef3c7;

color:#92400e;

}

.rejected{

background:#fee2e2;

color:#991b1b;

}

.meta{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

padding:15px 0;

border-top:1px solid #eee;

border-bottom:1px solid #eee;

}

.meta div{

font-size:14px;

color:#555;

}

.review-section{

display:flex;

flex-direction:column;

gap:14px;

}

.review-box{

background:#f8fafc;

padding:14px;

border-radius:10px;

border-left:4px solid #2563eb;

}

.review-box strong{

display:block;

margin-bottom:8px;

color:#0B3D91;

}

.question-box{

width:100%;

height:110px;

padding:12px;

border:1px solid #ddd;

border-radius:10px;

resize:vertical;

outline:none;

font-size:14px;

}

.action-buttons{

display:flex;

gap:12px;

flex-wrap:wrap;

margin-top:10px;

}

.btn{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

text-decoration:none;

display:inline-block;

text-align:center;

}

.btn-primary{

background:#16a34a;

color:white;

}

.btn-secondary{

background:#2563eb;

color:white;

}

.btn:hover{

opacity:.92;

}
  @media(max-width:1200px){

#submissionList{

grid-template-columns:repeat(auto-fill,minmax(360px,1fr));

}

}

@media(max-width:900px){

.sidebar{

position:relative;

width:100%;

height:auto;

padding:20px;

}

.main{

margin-left:0;

width:100%;

padding:20px;

}

.page{

flex-direction:column;

}

.stats{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:600px){

.stats{

grid-template-columns:1fr;

}

#submissionList{

grid-template-columns:1fr;

}

.meta{

grid-template-columns:1fr;

}

.header h1{

font-size:28px;

}

.section-title{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="page">

<div class="sidebar">

<div class="logo">

SRO Academy

Track your submissions, teacher feedback and replies.

</p>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="totalSubmission">

0

</h2>

<p>Total Submitted</p>

</div>

<div class="stat-card">

<h2 id="approvedSubmission">

0

</h2>

<p>Approved</p>

</div>

<div class="stat-card">

<h2 id="pendingSubmission">

0

</h2>

<p>Pending</p>

</div>

<div class="stat-card">

<h2 id="rejectedSubmission">

0

</h2>

<p>Rejected</p>

</div>

</div>

<h2 class="section-title">

</div>

</div>

src="my-submissions.js">

</script>

</body>

</html>
