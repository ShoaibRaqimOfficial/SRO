<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

SRO Academy | My Submissions

</title>

<link
rel="stylesheet"
href="style.css">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;

}

body{

background:#f4f7fb;

}

.wrapper{

max-width:1450px;

margin:35px auto;

padding:0 20px;

}

.header{

background:white;

padding:30px;

border-radius:16px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

margin-bottom:30px;

}

.header h1{

font-size:36px;

color:#0B3D91;

margin-bottom:10px;

}

.header p{

color:#666;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:35px;

}

.stat-card{

background:white;

border-radius:15px;

padding:25px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.stat-card h2{

font-size:38px;

color:#2563eb;

margin-bottom:8px;

}

.stat-card p{

color:#666;

}

.section-title{

font-size:34px;

color:#0B3D91;

margin-bottom:25px;

font-weight:bold;

}

#submissionList{

display:flex;

flex-direction:column;

gap:25px;

}

.submission-card{

background:white;

border-radius:18px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

overflow:hidden;

}
  .submission-header{

background:#0B3D91;

color:white;

padding:22px 28px;

display:flex;

justify-content:space-between;

align-items:center;

flex-wrap:wrap;

gap:15px;

}

.submission-header h2{

font-size:24px;

}

.submission-header p{

margin-top:6px;

opacity:.9;

font-size:14px;

}

.status{

display:inline-block;

padding:8px 16px;

border-radius:25px;

font-size:13px;

font-weight:bold;

}

.approved{

background:#dcfce7;

color:#166534;

}

.pending{

background:#fef3c7;

color:#92400e;

}

.rejected{

background:#fee2e2;

color:#991b1b;

}

.submission-body{

padding:25px;

}

.meta{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-bottom:25px;

}

.meta-box{

background:#f8fafc;

padding:16px;

border-radius:10px;

border-left:4px solid #2563eb;

}

.meta-box strong{

display:block;

margin-bottom:8px;

color:#0B3D91;

}

.feedback-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

margin-bottom:25px;

}

.feedback-card{

background:#f8fafc;

padding:18px;

border-radius:10px;

border-left:4px solid #16a34a;

}

.feedback-card h4{

margin-bottom:10px;

color:#0B3D91;

font-size:16px;

}

.feedback-card p{

line-height:1.7;

color:#444;

word-break:break-word;

}

.question-section{

margin-top:25px;

}

.question-section textarea{

width:100%;

height:120px;

padding:15px;

border:1px solid #ddd;

border-radius:10px;

resize:vertical;

outline:none;

font-size:15px;

margin-bottom:18px;

}

.button-row{

display:flex;

gap:15px;

flex-wrap:wrap;

}

.button-row button,

.button-row a{

padding:12px 22px;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

text-decoration:none;

display:inline-block;

}

.send-btn{

background:#16a34a;

color:white;

}

.view-btn{

background:#2563eb;

color:white;

}
  @media(max-width:1100px){

.meta{

grid-template-columns:repeat(2,1fr);

}

.feedback-grid{

grid-template-columns:1fr;

}

}

@media(max-width:768px){

.wrapper{

padding:15px;

margin:20px auto;

}

.header{

padding:22px;

}

.header h1{

font-size:28px;

}

.stats{

grid-template-columns:1fr 1fr;

gap:15px;

}

.submission-header{

flex-direction:column;

align-items:flex-start;

}

.meta{

grid-template-columns:1fr;

}

.button-row{

flex-direction:column;

}

.button-row button,

.button-row a{

width:100%;

text-align:center;

}

}

@media(max-width:480px){

.stats{

grid-template-columns:1fr;

}

.header h1{

font-size:24px;

}

.section-title{

font-size:26px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

<h1>

📤 My Submitted Assignments

</h1>

<p>

Track your submissions, teacher feedback, teacher replies and ask questions.

</p>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="totalSubmission">0</h2>

<p>Total Submitted</p>

</div>

<div class="stat-card">

<h2 id="approvedSubmission">0</h2>

<p>Approved</p>

</div>

<div class="stat-card">

<h2 id="pendingSubmission">0</h2>

<p>Pending</p>

</div>

<div class="stat-card">

<h2 id="rejectedSubmission">0</h2>

<p>Rejected</p>

</div>

</div>

<h2 class="section-title">

Assignment History

</h2>

<div id="submissionList">

<div class="submission-card">

<div class="submission-body">

Loading submissions...

</div>

</div>

</div>

</div>

<script
type="module"
src="my-submissions.js">

</script>

</body>

</html>
