<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO Academy Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-box" style="max-width:1000px;">

<h1>Admin Panel</h1>

<p>Add New Assignment</p>

<form id="assignmentForm">

<input
type="text"
id="title"
placeholder="Assignment Title"
required>

<textarea
id="description"
placeholder="Assignment Description"
required
style="width:100%;height:120px;padding:15px;margin-top:15px;border-radius:8px;"></textarea>

<input
type="text"
id="dueDate"
placeholder="Due Date"
required>

<input
type="text"
id="downloadLink"
placeholder="Raw Video Download Link (Google Drive)">

<button
type="submit"
class="login-btn">
Publish Assignment
</button>

</form>

<p id="message"></p>

<hr style="margin:40px 0;">

<h2 style="margin-bottom:20px;">
Published Assignments
</h2>

<table
width="100%"
border="1"
cellspacing="0"
cellpadding="10"
style="border-collapse:collapse;background:#fff;">

<thead>

<tr>

<th>Title</th>

<th>Due Date</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="assignmentTable">

<tr>

<td colspan="4" align="center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
