<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SRO AI Studio</title>

<link rel="stylesheet" href="css/ai-studio.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="hero">

<div class="container">

<h1>SRO AI Studio</h1>

<p>

Generate Professional AI Avatar Videos using
HeyGen Technology.

</p>

<a href="#generator" class="hero-btn">

🚀 Generate Now

</a>

</div>

</header>

<section id="generator" class="generator">

<div class="container">

<h2>Generate AI Avatar Video</h2>

<form id="aiOrderForm">
<div class="form-group">

<label>📝 Script</label>

<textarea
id="script"
rows="8"
placeholder="Paste your complete script..."
required></textarea>

</div>

<div class="form-group">

<label>🧑 Upload Avatar Image</label>

<input
type="file"
id="avatar"
accept="image/*"
required>

</div>

<div class="form-group">

<label>🎤 Upload Voice Sample</label>

<input
type="file"
id="voice"
accept="audio/*,video/*"
required>

</div>

<div class="form-group">

<label>🌍 Language</label>

<select id="language">

<option>English</option>

<option>Urdu</option>

<option>Arabic</option>

<option>Hindi</option>

<option>Spanish</option>

<option>French</option>

<option>German</option>

</select>

</div>

<div class="form-group">

<label>📺 Video Ratio</label>

<select id="ratio">

<option>16:9</option>

<option>9:16</option>

<option>1:1</option>

</select>

</div>

<div class="form-group">

<label>⏱ Video Duration</label>

<select id="duration">

<option value="5">5 Minutes</option>

<option value="10">10 Minutes</option>

<option value="20">20 Minutes (1 Credit)</option>

<option value="40">40 Minutes (2 Credits)</option>

<option value="60">60 Minutes (3 Credits)</option>

</select>

</div>

<div class="form-group">

<label>📝 Additional Notes</label>

<textarea
id="notes"
rows="4"
placeholder="Any extra instructions..."></textarea>

</div>

<div class="credit-box">

<h3>

🪙 Credits Required

</h3>

<p id="creditText">

1 Credit

</p>

</div>

<button
type="submit"
class="generate-btn">

🚀 Generate Now

</button>
</form>

<p id="message"></p>

</div>

</section>

<script type="module" src="ai-studio.js"></script>

</body>

</html>
